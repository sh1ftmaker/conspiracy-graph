<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>The Conspiracy Atlas — truth × impact</title>
<meta name="description" content="An interactive atlas of conspiracy theories plotted by how TRUE they are and how IMPACTFUL they would be if true — with evidence, timelines, genres, and a load-bearing dependency graph."/>
<style>
  :root{
    --bg:#07080e; --bg2:#0b0d16; --panel:rgba(15,17,27,.86); --line:rgba(255,255,255,.09);
    --txt:#e8eaf3; --dim:#9aa1bb; --dim2:#6b7291; --accent:#7cf2d6; --for:#4ade80; --against:#f87171;
    --shadow:0 10px 40px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:radial-gradient(1200px 800px at 70% -10%,#12162a 0%,var(--bg) 55%);color:var(--txt);
    font:13px/1.5 ui-sans-serif,system-ui,"Segoe UI",Roboto,Helvetica,Arial;overscroll-behavior:none;-webkit-text-size-adjust:100%}
  #stage{position:fixed;inset:0}
  canvas{position:absolute;inset:0;display:block;touch-action:none}
  .hud{position:fixed;z-index:5}
  /* header */
  #top{top:0;left:0;right:0;padding:12px 18px;display:flex;align-items:center;gap:18px;
    background:linear-gradient(180deg,rgba(7,8,14,.92),rgba(7,8,14,0));backdrop-filter:blur(3px)}
  #brand h1{margin:0;font-size:15.5px;font-weight:700;letter-spacing:.2px}
  #brand p{margin:1px 0 0;color:var(--dim);font-size:11px}
  #tabs{display:flex;gap:6px;margin-left:auto}
  #tabs button{font-size:12px;padding:6px 13px;border:1px solid var(--line);border-radius:20px;background:transparent;
    color:var(--dim);cursor:pointer;transition:.13s;white-space:nowrap}
  #tabs button:hover{color:var(--txt);border-color:rgba(255,255,255,.25)}
  #tabs button.on{background:var(--accent);color:#04130f;border-color:var(--accent);font-weight:650}
  .panel{background:var(--panel);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}
  /* left controls */
  #controls{top:74px;left:16px;width:236px;padding:13px 14px;max-height:calc(100vh - 150px);overflow:auto}
  #controls h2{margin:14px 0 7px;font-size:10px;text-transform:uppercase;letter-spacing:1.3px;color:var(--dim2)}
  #controls h2:first-child{margin-top:0}
  #search{width:100%;padding:8px 10px;background:rgba(0,0,0,.32);border:1px solid var(--line);border-radius:9px;
    color:var(--txt);font-size:12.5px;outline:none}
  #search:focus{border-color:var(--accent)}
  #results{margin-top:5px}
  #results div{padding:4px 8px;border-radius:6px;cursor:pointer;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #results div:hover{background:rgba(255,255,255,.06);color:var(--txt)}
  .lg{display:flex;align-items:center;gap:8px;margin:3px 0;font-size:11.5px;color:var(--dim);cursor:pointer;
    padding:2px 4px;border-radius:6px;user-select:none}
  .lg:hover{background:rgba(255,255,255,.05)}
  .lg.off{opacity:.32}
  .sw{width:11px;height:11px;border-radius:3px;flex:none;box-shadow:0 0 0 1px rgba(255,255,255,.12)}
  .lg .ct{margin-left:auto;color:var(--dim2);font-size:10.5px}
  .allrow{display:flex;gap:8px;margin:2px 0 6px}
  .allrow a{font-size:10.5px;color:var(--accent);cursor:pointer;text-decoration:underline;opacity:.8}
  /* legend / axis help */
  #legend{bottom:64px;right:16px;width:210px;padding:12px 13px}
  #legend h2{margin:0 0 8px;font-size:10px;text-transform:uppercase;letter-spacing:1.3px;color:var(--dim2)}
  #legend .q{font-size:10.5px;color:var(--dim);line-height:1.35;margin:5px 0}
  #legend b{color:var(--txt)}
  /* year slider */
  #timebar{bottom:14px;left:50%;transform:translateX(-50%);width:min(620px,92vw);padding:9px 16px 11px;
    display:flex;align-items:center;gap:12px}
  #timebar .yl{font-variant-numeric:tabular-nums;color:var(--accent);font-weight:650;font-size:12.5px;min-width:82px;text-align:center}
  #timebar input{flex:1;accent-color:var(--accent)}
  #play{border:1px solid var(--line);background:transparent;color:var(--dim);border-radius:8px;cursor:pointer;
    width:30px;height:26px;font-size:12px}
  #play:hover{color:var(--txt)}
  /* detail card */
  #card{top:74px;right:16px;width:340px;max-height:calc(100vh - 100px);overflow:auto;padding:0;display:none}
  #card.show{display:block}
  #card .hd{padding:15px 16px 12px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);z-index:2}
  #card h3{margin:0;font-size:16.5px;font-weight:700;line-height:1.25}
  #card .sub{color:var(--dim);font-size:11px;margin-top:4px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  #card .bd{padding:13px 16px 16px}
  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:600}
  .metric{margin:9px 0}
  .metric .ml{display:flex;justify-content:space-between;font-size:10.5px;color:var(--dim);margin-bottom:3px}
  .metric .mv{color:var(--txt);font-weight:650;font-variant-numeric:tabular-nums}
  .track{height:7px;border-radius:5px;background:rgba(255,255,255,.08);overflow:hidden}
  .fill{height:100%;border-radius:5px}
  #card .summary{color:#cdd2e6;font-size:12.5px;margin:12px 0}
  #card h4{margin:14px 0 6px;font-size:10px;text-transform:uppercase;letter-spacing:1.1px;color:var(--dim2)}
  ul.ev{margin:0;padding:0;list-style:none}
  ul.ev li{position:relative;padding:3px 0 3px 18px;font-size:12px;color:#c7ccde}
  ul.ev li::before{position:absolute;left:0;top:2px;font-weight:700}
  ul.ev.for li::before{content:"✓";color:var(--for)}
  ul.ev.against li::before{content:"✕";color:var(--against)}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{padding:3px 9px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--line);
    background:rgba(255,255,255,.03);color:var(--dim)}
  .chip:hover{color:var(--txt);border-color:var(--accent)}
  .chip .cx{color:var(--dim2);font-size:9.5px;margin-left:3px}
  a.src{color:var(--accent);text-decoration:none;font-size:11.5px}
  .close{position:absolute;top:12px;right:13px;cursor:pointer;color:var(--dim);font-size:18px;line-height:1;z-index:3}
  .close:hover{color:var(--txt)}
  /* tooltip */
  #tip{position:fixed;z-index:9;pointer-events:none;display:none;max-width:250px;padding:8px 11px;
    background:rgba(8,9,15,.96);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow)}
  #tip b{font-size:12.5px}
  #tip p{margin:3px 0 0;color:var(--dim);font-size:10.5px}
  #tip .tp{margin-top:5px;display:flex;gap:5px;font-size:10px;color:var(--dim2)}
  #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:20;background:var(--bg);flex-direction:column;gap:15px}
  #loading .spin{width:34px;height:34px;border:3px solid rgba(255,255,255,.12);border-top-color:var(--accent);border-radius:50%;animation:s 1s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  .stat{display:flex;justify-content:space-between;font-size:11px;color:var(--dim);padding:1px 4px}
  .stat b{color:var(--txt);font-variant-numeric:tabular-nums}
  @media (max-width:820px){
    #controls{display:none} #legend{display:none}
    #card{left:10px;right:10px;width:auto;top:auto;bottom:70px;max-height:56vh}
    #brand p{display:none} #tabs button{padding:6px 10px}
    #top{gap:8px;padding:10px}
  }
</style>
</head>
<body>
<div id="stage"><canvas id="cv"></canvas></div>

<header id="top" class="hud">
  <div id="brand"><h1>🕳️ The Conspiracy Atlas</h1><p>Plotted by how <b style="color:var(--accent)">true</b> they are × how <b style="color:var(--accent)">impactful</b> if true</p></div>
  <nav id="tabs">
    <button data-v="scatter" class="on">Truth × Impact</button>
    <button data-v="graph">Load-bearing graph</button>
    <button data-v="time">Timeline</button>
  </nav>
</header>

<aside id="controls" class="hud panel">
  <h2>Find a theory</h2>
  <input id="search" placeholder="search 60+ theories…" autocomplete="off"/>
  <div id="results"></div>
  <h2>Genres <span id="gcount" style="color:var(--dim2);text-transform:none;letter-spacing:0"></span></h2>
  <div class="allrow"><a id="gall">all</a><a id="gnone">none</a></div>
  <div id="genreList"></div>
  <h2>Catalog</h2>
  <div id="stats"></div>
</aside>

<section id="legend" class="hud panel"></section>

<div id="card" class="hud panel">
  <span class="close" id="cClose">×</span>
  <div class="hd"><h3 id="cTitle"></h3><div class="sub" id="cSub"></div></div>
  <div class="bd" id="cBody"></div>
</div>

<div id="timebar" class="hud panel">
  <button id="play" title="play through time">▶</button>
  <input id="year" type="range" min="0" max="100" value="100"/>
  <span class="yl" id="yl">all years</span>
</div>

<div id="tip"></div>
<div id="loading"><div class="spin"></div><div>assembling the atlas…</div></div>

<script>
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let DATA, T=[], META, GEN=[], byId={};
let view='scatter', sel=null, hover=null, dpr=Math.min(devicePixelRatio||1,2);
let W=0,H=0, mouse={x:-9,y:-9};
let activeGenres=new Set(), query='', yearVal=1, yearMin=1900, yearMax=2027;
const esc=s=>(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

// ---------- load ----------
fetch('data.json').then(r=>r.json()).then(d=>{
  DATA=d; T=d.theories; META=d.meta; GEN=META.genres;
  T.forEach(t=>byId[t.id]=t);
  GEN.forEach(g=>activeGenres.add(g.key));
  const yrs=T.map(t=>t.year); yearMin=Math.min(...yrs); yearMax=Math.max(...yrs.concat([new Date().getFullYear()]));
  yearVal=yearMax;
  buildGenreList(); buildStats();
  T.forEach(t=>{t.dependents=T.filter(o=>o.depends_on.includes(t.id)).map(o=>o.id);});
  initGraph();
  document.getElementById('loading').style.display='none';
  resize(); requestAnimationFrame(loop);
});

function statusOf(tr){for(const s of META.truth_scale){if(tr>=s.min&&tr<=s.max)return s;}return{label:'?'};}
const gc=k=>{const g=GEN.find(x=>x.key===k);return g?g.color:'#888';};
const gl=k=>{const g=GEN.find(x=>x.key===k);return g?g.label:k;};

// ---------- filter ----------
function visible(t){
  if(!activeGenres.has(t.genre)) return false;
  if(yearVal<yearMax && t.year>yearVal) return false;
  return true;
}

// ---------- genre list / stats ----------
function buildGenreList(){
  const el=document.getElementById('genreList'); el.innerHTML='';
  GEN.forEach(g=>{
    const n=META.by_genre[g.key]||0; if(!n) return;
    const d=document.createElement('div'); d.className='lg'; d.dataset.k=g.key;
    d.innerHTML=`<span class="sw" style="background:${g.color}"></span>${esc(g.label)}<span class="ct">${n}</span>`;
    d.onclick=()=>{activeGenres.has(g.key)?activeGenres.delete(g.key):activeGenres.add(g.key);syncGenre();};
    el.appendChild(d);
  });
  document.getElementById('gcount').textContent=`(${GEN.filter(g=>META.by_genre[g.key]).length})`;
  syncGenre();
}
function syncGenre(){
  document.querySelectorAll('#genreList .lg').forEach(d=>d.classList.toggle('off',!activeGenres.has(d.dataset.k)));
}
document.getElementById('gall').onclick=()=>{GEN.forEach(g=>activeGenres.add(g.key));syncGenre();};
document.getElementById('gnone').onclick=()=>{activeGenres.clear();syncGenre();};
function buildStats(){
  const s=document.getElementById('stats');
  const order=['Confirmed','Substantiated','Plausible','Contested','Fringe','Debunked'];
  const col={Confirmed:'#4ade80',Substantiated:'#86efac',Plausible:'#bef264',Contested:'#fbbf24',Fringe:'#fb923c',Debunked:'#f87171'};
  s.innerHTML=`<div class="stat"><span>theories</span><b>${META.count}</b></div>`+
   order.filter(k=>META.by_status[k]).map(k=>`<div class="stat"><span style="color:${col[k]}">${k}</span><b>${META.by_status[k]}</b></div>`).join('');
}

// ================= RENDER =================
function loop(){ draw(); requestAnimationFrame(loop); }
function draw(){
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);
  if(view==='scatter') drawScatter();
  else if(view==='graph') drawGraph();
  else drawTimeline();
}

// plot rect (shared)
function plotRect(){ const l=64,r=W-30,t=92,b=H-92; return {l,r,t,b,w:r-l,h:b-t}; }

// ---- SCATTER: x=truth y=impact ----
function sx(tr,R){return R.l + tr/100*R.w;}
function sy(im,R){return R.b - im/100*R.h;}
function drawScatter(){
  const R=plotRect();
  // quadrant tints
  const mx=sx(50,R), my=sy(50,R);
  const tints=[[R.l,R.t,mx-R.l,my-R.t,'rgba(248,113,113,.055)'],   // TL low truth high impact
              [mx,R.t,R.r-mx,my-R.t,'rgba(74,222,128,.06)'],       // TR high truth high impact
              [R.l,my,mx-R.l,R.b-my,'rgba(148,163,184,.04)'],      // BL
              [mx,my,R.r-mx,R.b-my,'rgba(96,165,250,.045)']];      // BR
  tints.forEach(([x,y,w,h,c])=>{ctx.fillStyle=c;ctx.fillRect(x,y,w,h);});
  // grid
  ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=1;ctx.fillStyle='#6b7291';ctx.font='10px system-ui';
  for(let v=0;v<=100;v+=25){
    const x=sx(v,R); ctx.beginPath();ctx.moveTo(x,R.t);ctx.lineTo(x,R.b);ctx.stroke();
    ctx.textAlign='center';ctx.fillText(v,x,R.b+15);
    const y=sy(v,R); ctx.beginPath();ctx.moveTo(R.l,y);ctx.lineTo(R.r,y);ctx.stroke();
    ctx.textAlign='right';ctx.fillText(v,R.l-8,y+3);
  }
  // quadrant labels
  ctx.font='600 11px system-ui';
  const ql=(x,y,t,c,al)=>{ctx.fillStyle=c;ctx.textAlign=al;ctx.fillText(t,x,y);};
  ql(R.l+10,R.t+16,'HIGH-STAKES MYTHS · false but world-shaking','rgba(248,113,113,.6)','left');
  ql(R.r-10,R.t+16,'PROVEN & WORLD-CHANGING','rgba(74,222,128,.7)','right');
  ql(R.l+10,R.b-8,'harmless nonsense','rgba(148,163,184,.5)','left');
  ql(R.r-10,R.b-8,'true but minor','rgba(96,165,250,.6)','right');
  // axis titles
  ctx.fillStyle='#9aa1bb';ctx.font='600 12px system-ui';
  ctx.textAlign='center';ctx.fillText('◀ less true          HOW TRUE IS IT?          more true ▶',(R.l+R.r)/2,R.b+34);
  ctx.save();ctx.translate(20,(R.t+R.b)/2);ctx.rotate(-Math.PI/2);
  ctx.fillText('◀ trivial     IMPACT IF TRUE     civilization-defining ▶',0,0);ctx.restore();
  // points
  const vis=T.filter(visible);
  drawPoints(vis, t=>sx(t.truth,R), t=>sy(t.impact,R));
}

function radius(t){return 3.2 + Math.sqrt(t.notoriety)/2.1;}
function drawPoints(list, fx, fy){
  hover=null; let hd=1e9;
  // edges for selected
  if(sel){
    const cx=fx(sel),cy=fy(sel);
    const drawEdge=(oid,col,wd)=>{const o=byId[oid];if(!o||!visible(o))return;ctx.strokeStyle=col;ctx.lineWidth=wd;
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(fx(o),fy(o));ctx.stroke();};
    sel.related.forEach(o=>drawEdge(o,'rgba(124,242,214,.28)',1));
    sel.depends_on.forEach(o=>drawEdge(o,'rgba(251,191,36,.55)',1.6));
    sel.dependents.forEach(o=>drawEdge(o,'rgba(168,85,247,.4)',1.2));
  }
  for(const t of list){
    const x=fx(t),y=fy(t),r=radius(t);
    const d=(mouse.x-x)**2+(mouse.y-y)**2;
    if(d<hd&&d<225){hd=d;hover=t;}
    const isSel=sel===t, near=sel&&(sel.related.includes(t.id)||sel.depends_on.includes(t.id)||sel.dependents.includes(t.id));
    ctx.beginPath();ctx.arc(x,y,r,0,7);
    ctx.globalAlpha=sel&&!isSel&&!near?.34:1;
    ctx.fillStyle=gc(t.genre);ctx.fill();
    if(isSel||near){ctx.globalAlpha=1;ctx.lineWidth=isSel?2.4:1.4;ctx.strokeStyle=isSel?'#fff':'rgba(255,255,255,.6)';ctx.stroke();}
    ctx.globalAlpha=1;
  }
  // labels for selected + neighbors + high notoriety
  ctx.font='11px system-ui';ctx.textAlign='left';
  for(const t of list){
    const big=t.notoriety>=78, isSel=sel===t, near=sel&&(sel.related.includes(t.id)||sel.depends_on.includes(t.id)||sel.dependents.includes(t.id));
    if(!(isSel||near||(big&&!sel))) continue;
    const x=fx(t),y=fy(t);
    ctx.fillStyle=isSel?'#fff':'rgba(220,225,240,.8)';
    ctx.fillText(t.name, x+radius(t)+4, y+3.5);
  }
  document.getElementById('cv').style.cursor=hover?'pointer':'default';
}

// ---- GRAPH: force-directed depends_on / related ----
let G={nodes:[],edges:[],settled:0};
function initGraph(){
  G.nodes=T.map(t=>({t,x:0,y:0,vx:0,vy:0}));
  const idx={};G.nodes.forEach((n,i)=>idx[n.t.id]=i);
  const R=plotRect();
  G.nodes.forEach((n,i)=>{const a=i/G.nodes.length*6.283, rr=120+((i*53)%160);n.x=(R.l+R.r)/2+Math.cos(a)*rr;n.y=(R.t+R.b)/2+Math.sin(a)*rr;});
  G.edges=[];
  T.forEach(t=>{
    t.depends_on.forEach(o=>{if(byId[o])G.edges.push({a:idx[t.id],b:idx[o],kind:'dep'});});
    t.related.forEach(o=>{if(byId[o]&&t.id<o)G.edges.push({a:idx[t.id],b:idx[o],kind:'rel'});});
  });
  G.idx=idx;
}
function stepGraph(){
  const R=plotRect(),cx=(R.l+R.r)/2,cy=(R.t+R.b)/2;
  const N=G.nodes;
  for(let i=0;i<N.length;i++){const a=N[i];if(!visible(a.t)){continue;}
    for(let j=i+1;j<N.length;j++){const b=N[j];if(!visible(b.t))continue;
      let dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy+.01;if(d2>90000)continue;
      const f=380/d2;const d=Math.sqrt(d2);dx/=d;dy/=d;a.vx+=dx*f;a.vy+=dy*f;b.vx-=dx*f;b.vy-=dy*f;}}
  G.edges.forEach(e=>{const a=N[e.a],b=N[e.b];if(!visible(a.t)||!visible(b.t))return;
    let dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)+.01;const L=e.kind==='dep'?70:95;
    const f=(d-L)*(e.kind==='dep'?.012:.006);dx/=d;dy/=d;a.vx+=dx*f;a.vy+=dy*f;b.vx-=dx*f;b.vy-=dy*f;});
  N.forEach(n=>{n.vx+=(cx-n.x)*.0016;n.vy+=(cy-n.y)*.0016;
    n.x+=n.vx*.85;n.y+=n.vy*.85;n.vx*=.86;n.vy*=.86;
    n.x=clamp(n.x,R.l,R.r);n.y=clamp(n.y,R.t,R.b);});
}
function drawGraph(){
  if(G.settled<420){for(let k=0;k<2;k++)stepGraph();G.settled++;}
  const N=G.nodes;
  // edges
  G.edges.forEach(e=>{const a=N[e.a],b=N[e.b];if(!visible(a.t)||!visible(b.t))return;
    const involved=sel&&(a.t===sel||b.t===sel);
    if(e.kind==='dep'){ctx.strokeStyle=involved?'rgba(251,191,36,.85)':'rgba(251,191,36,.22)';ctx.lineWidth=involved?2:1;}
    else{ctx.strokeStyle=involved?'rgba(124,242,214,.6)':'rgba(255,255,255,.05)';ctx.lineWidth=1;}
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
    if(e.kind==='dep'){ // arrowhead near b
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)+.01,ux=dx/d,uy=dy/d,r=nodeR(b.t);
      const hx=b.x-ux*(r+2),hy=b.y-uy*(r+2);ctx.fillStyle=involved?'rgba(251,191,36,.9)':'rgba(251,191,36,.3)';
      ctx.beginPath();ctx.moveTo(hx,hy);ctx.lineTo(hx-ux*6+uy*3.5,hy-uy*6-ux*3.5);ctx.lineTo(hx-ux*6-uy*3.5,hy-uy*6+ux*3.5);ctx.fill();}
  });
  hover=null;let hd=1e9;
  N.forEach(n=>{if(!visible(n.t))return;const d=(mouse.x-n.x)**2+(mouse.y-n.y)**2;const r=nodeR(n.t);if(d<hd&&d<(r+6)**2){hd=d;hover=n.t;}});
  N.forEach(n=>{if(!visible(n.t))return;const r=nodeR(n.t),isSel=sel===n.t;
    const near=sel&&(sel.depends_on.includes(n.t.id)||sel.dependents.includes(n.t.id)||sel.related.includes(n.t.id));
    ctx.globalAlpha=sel&&!isSel&&!near?.35:1;
    ctx.beginPath();ctx.arc(n.x,n.y,r,0,7);ctx.fillStyle=gc(n.t.genre);ctx.fill();
    if(isSel||near||n.t.load_bearing>=2){ctx.lineWidth=isSel?2.4:1.3;ctx.strokeStyle=isSel?'#fff':'rgba(255,255,255,.5)';ctx.stroke();}
    ctx.globalAlpha=1;});
  // labels for load-bearing hubs + selected
  ctx.font='11px system-ui';ctx.textAlign='center';
  N.forEach(n=>{if(!visible(n.t))return;const isSel=sel===n.t;
    const near=sel&&(sel.depends_on.includes(n.t.id)||sel.dependents.includes(n.t.id));
    if(isSel||near||n.t.load_bearing>=2){ctx.fillStyle=isSel?'#fff':'rgba(220,225,240,.82)';
      ctx.fillText(n.t.name,n.x,n.y-nodeR(n.t)-4);}});
  document.getElementById('cv').style.cursor=hover?'pointer':'default';
}
function nodeR(t){return 4 + t.load_bearing*3.2 + t.notoriety/40;}

// ---- TIMELINE: x=year (piecewise), y=impact, color=genre ----
function tx(year,R){ // pre-1900 compressed into left 16%
  if(year<1900){const f=(year-yearMin)/Math.max(1,1900-yearMin);return R.l+ f*R.w*0.16;}
  return R.l+R.w*0.16 + (year-1900)/(2027-1900)*R.w*0.84;
}
function drawTimeline(){
  const R=plotRect();
  ctx.strokeStyle='rgba(255,255,255,.05)';ctx.fillStyle='#6b7291';ctx.font='10px system-ui';ctx.lineWidth=1;
  [1900,1950,1980,2000,2010,2020].forEach(y=>{const x=tx(y,R);ctx.beginPath();ctx.moveTo(x,R.t);ctx.lineTo(x,R.b);ctx.stroke();
    ctx.textAlign='center';ctx.fillText(y,x,R.b+15);});
  const xp=tx(1900,R);ctx.textAlign='center';ctx.fillStyle='#6b7291';ctx.fillText('◀ pre-1900',(R.l+xp)/2,R.b+15);
  ctx.strokeStyle='rgba(255,255,255,.12)';ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(xp,R.t);ctx.lineTo(xp,R.b);ctx.stroke();ctx.setLineDash([]);
  for(let v=0;v<=100;v+=25){const y=R.b-v/100*R.h;ctx.strokeStyle='rgba(255,255,255,.045)';ctx.beginPath();ctx.moveTo(R.l,y);ctx.lineTo(R.r,y);ctx.stroke();
    ctx.fillStyle='#6b7291';ctx.textAlign='right';ctx.fillText(v,R.l-8,y+3);}
  ctx.fillStyle='#9aa1bb';ctx.font='600 12px system-ui';ctx.textAlign='center';
  ctx.fillText('WHEN THE THEORY WAS FORMULATED  →',(R.l+R.r)/2,R.b+34);
  ctx.save();ctx.translate(20,(R.t+R.b)/2);ctx.rotate(-Math.PI/2);ctx.fillText('impact if true ▶',0,0);ctx.restore();
  // now line from slider
  if(yearVal<yearMax){const x=tx(yearVal,R);ctx.strokeStyle='rgba(124,242,214,.5)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(x,R.t);ctx.lineTo(x,R.b);ctx.stroke();}
  const vis=T.filter(visible);
  drawPoints(vis, t=>tx(t.year,R), t=>R.b - t.impact/100*R.h);
}

// ================= INTERACTION =================
function pickAt(){return hover;}
cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect();mouse.x=e.clientX-r.left;mouse.y=e.clientY-r.top;
  const t=hover;const tip=document.getElementById('tip');
  if(t){const s=statusOf(t.truth);
    tip.innerHTML=`<b>${esc(t.name)}</b><p style="color:${gc(t.genre)}">${esc(gl(t.genre))} · ${t.year}</p>`+
      `<div class="tp"><span>truth <b style="color:#e8eaf3">${t.truth}</b></span><span>impact <b style="color:#e8eaf3">${t.impact}</b></span><span>${s.label}</span></div>`;
    tip.style.display='block';const w=tip.offsetWidth,h=tip.offsetHeight;
    tip.style.left=Math.min(e.clientX+14,innerWidth-w-8)+'px';tip.style.top=Math.min(e.clientY+14,innerHeight-h-8)+'px';
  } else tip.style.display='none';
});
cv.addEventListener('mouseleave',()=>{mouse.x=-9;document.getElementById('tip').style.display='none';});
cv.addEventListener('click',()=>{ if(hover) select(hover); else deselect(); });

function select(t){sel=t;showCard(t);}
function deselect(){sel=null;document.getElementById('card').classList.remove('show');}
document.getElementById('cClose').onclick=deselect;
window.addEventListener('keydown',e=>{if(e.key==='Escape')deselect();});

function bar(label,val,col){
  return `<div class="metric"><div class="ml"><span>${label}</span><span class="mv">${val}<span style="color:var(--dim2)">/100</span></span></div>
  <div class="track"><div class="fill" style="width:${val}%;background:${col}"></div></div></div>`;
}
function showCard(t){
  const card=document.getElementById('card');card.classList.add('show');card.scrollTop=0;
  const s=statusOf(t.truth);
  document.getElementById('cTitle').textContent=t.name;
  document.getElementById('cSub').innerHTML=
    `<span class="pill" style="background:${gc(t.genre)}22;color:${gc(t.genre)};border:1px solid ${gc(t.genre)}55">${esc(gl(t.genre))}</span>`+
    `<span class="pill" style="background:${statusCol(t.truth)}22;color:${statusCol(t.truth)};border:1px solid ${statusCol(t.truth)}55">${s.label}</span>`+
    `<span style="color:var(--dim2)">${t.year}</span>`+
    (t.load_bearing?`<span style="color:#a855f7">⚛ load-bearing · ${t.load_bearing} rely on it</span>`:'');
  const relChips=ids=>ids.map(id=>byId[id]?`<span class="chip" data-id="${id}">${esc(byId[id].name)}</span>`:'').join('');
  let h='';
  h+=`<div class="summary">${esc(t.summary)}</div>`;
  h+=bar('How true',t.truth,statusCol(t.truth));
  h+=bar('Impact if true',t.impact,'#60a5fa');
  h+=bar('Notoriety',t.notoriety,'#a855f7');
  if(t.evidence_for.length){h+=`<h4>Evidence / claims for</h4><ul class="ev for">${t.evidence_for.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>`;}
  if(t.evidence_against.length){h+=`<h4>Evidence against</h4><ul class="ev against">${t.evidence_against.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>`;}
  if(t.depends_on.length){h+=`<h4>⚛ Requires (load-bearing)</h4><div class="chips">${relChips(t.depends_on)}</div>`;}
  if(t.dependents&&t.dependents.length){h+=`<h4>Supports these theories</h4><div class="chips">${relChips(t.dependents)}</div>`;}
  if(t.related.length){h+=`<h4>Related</h4><div class="chips">${relChips(t.related)}</div>`;}
  if(t.wikipedia){h+=`<div style="margin-top:14px"><a class="src" href="${t.wikipedia}" target="_blank" rel="noopener">Wikipedia ↗</a></div>`;}
  const bd=document.getElementById('cBody');bd.innerHTML=h;
  bd.querySelectorAll('.chip').forEach(c=>c.onclick=()=>select(byId[c.dataset.id]));
}
function statusCol(tr){return tr>=91?'#4ade80':tr>=76?'#86efac':tr>=56?'#bef264':tr>=31?'#fbbf24':tr>=11?'#fb923c':'#f87171';}

// tabs
document.querySelectorAll('#tabs button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#tabs button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
  view=b.dataset.v; if(view==='graph')G.settled=Math.min(G.settled,120); updateLegend();
});
// search
const search=document.getElementById('search'),results=document.getElementById('results');
search.oninput=()=>{const q=search.value.trim().toLowerCase();results.innerHTML='';if(!q)return;
  const hits=T.filter(t=>t.name.toLowerCase().includes(q)||(t.aliases||[]).some(a=>a.toLowerCase().includes(q))).slice(0,18);
  hits.forEach(t=>{const d=document.createElement('div');d.innerHTML=`<span class="sw" style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${gc(t.genre)};margin-right:6px"></span>${esc(t.name)}`;
    d.onclick=()=>{if(!activeGenres.has(t.genre)){activeGenres.add(t.genre);syncGenre();}select(t);};results.appendChild(d);});
};
// year slider
const yearInput=document.getElementById('year'),yl=document.getElementById('yl');
yearInput.oninput=()=>{const f=yearInput.value/100;yearVal=Math.round(lerp(yearMin,yearMax,f));
  yl.textContent=yearVal>=yearMax?'all years':'≤ '+yearVal; G.settled=Math.min(G.settled,200);};
let playing=null;
document.getElementById('play').onclick=function(){
  if(playing){clearInterval(playing);playing=null;this.textContent='▶';return;}
  this.textContent='⏸';let v=+yearInput.value; if(v>=100)v=0;
  playing=setInterval(()=>{v+=1.2;if(v>=100){v=100;clearInterval(playing);playing=null;document.getElementById('play').textContent='▶';}
    yearInput.value=v;yearInput.oninput();},70);
};
// legend
function updateLegend(){
  const el=document.getElementById('legend');
  if(view==='scatter')el.innerHTML=`<h2>How to read</h2>
    <div class="q"><b>→ right</b> = better evidence it's true.<br><b>↑ up</b> = bigger deal if true.</div>
    <div class="q"><b style="color:#4ade80">Top-right</b>: proven & huge (MKUltra, mass surveillance).</div>
    <div class="q"><b style="color:#f87171">Top-left</b>: false but explosive (reptilians, QAnon).</div>
    <div class="q">dot size = notoriety · color = genre · click for evidence.</div>`;
  else if(view==='graph')el.innerHTML=`<h2>Load-bearing graph</h2>
    <div class="q"><span style="color:#fbbf24">amber arrows</span> = "A requires B to be true". Bigger node = more theories rest on it.</div>
    <div class="q"><span style="color:#7cf2d6">teal</span> = merely related.</div>
    <div class="q">Hubs like <b>New World Order</b> & <b>Deep State</b> hold up many others.</div>`;
  else el.innerHTML=`<h2>Timeline</h2>
    <div class="q"><b>→</b> = year the theory was formulated. Height = impact if true.</div>
    <div class="q">Hit <b>▶</b> or drag the slider to watch theories appear through history.</div>`;
}

function resize(){W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';G.settled=Math.min(G.settled,120);updateLegend();}
addEventListener('resize',resize);
</script>
