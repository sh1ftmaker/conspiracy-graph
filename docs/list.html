<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Conspiracy Atlas — List</title>
<style>
  :root{
    --bg:#07080e; --panel:rgba(15,17,27,.86); --line:rgba(255,255,255,.09);
    --txt:#e8eaf3; --dim:#9aa1bb; --accent:#7cf2d6;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
    font:13px/1.45 ui-sans-serif,system-ui,Segoe UI,Roboto,Helvetica,Arial;
    -webkit-text-size-adjust:100%}

  #hdr{position:sticky;top:0;z-index:40;background:rgba(7,8,14,.92);backdrop-filter:blur(9px);
    border-bottom:1px solid var(--line);padding:10px 18px}
  #hdr .top{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  #hdr h1{margin:0;font-size:15px;font-weight:650;letter-spacing:.3px;white-space:nowrap}
  #pagenav{display:flex;gap:6px;flex-wrap:wrap}
  #pagenav a{font-size:10.5px;padding:3px 10px;border:1px solid var(--line);border-radius:20px;
    color:var(--dim);text-decoration:none;white-space:nowrap}
  #pagenav a.on{background:var(--accent);color:#04130f;border-color:var(--accent);font-weight:600}
  #pagenav a:hover:not(.on){color:var(--txt);border-color:rgba(255,255,255,.25)}
  .tools{display:flex;align-items:center;gap:8px;margin-top:9px;flex-wrap:wrap}
  #q{width:230px;padding:6px 10px;background:rgba(0,0,0,.32);border:1px solid var(--line);
    border-radius:7px;color:var(--txt);font-size:12px;outline:none}
  #q:focus{border-color:var(--accent)}
    .dr{position:relative;height:24px;flex:1;min-width:120px}
  .dr .track{position:absolute;top:50%;transform:translateY(-50%);height:4px;left:0;right:0;border-radius:2px;background:rgba(255,255,255,.12)}
  .dr .fillbar{position:absolute;top:50%;transform:translateY(-50%);height:4px;border-radius:2px;background:var(--accent);opacity:.55}
  .dr input[type=range]{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);width:100%;margin:0;height:20px;
    -webkit-appearance:none;appearance:none;background:none;pointer-events:none;outline:none}
  .dr input[type=range]::-webkit-slider-runnable-track{background:none;border:none}
  .dr input[type=range]::-moz-range-track{background:none;border:none}
  .dr input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:13px;height:13px;border-radius:50%;
    background:var(--accent);cursor:pointer;pointer-events:auto;border:none;box-shadow:0 0 0 2px rgba(0,0,0,.4)}
  .dr input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:var(--accent);
    cursor:pointer;pointer-events:auto;border:none;box-shadow:0 0 0 2px rgba(0,0,0,.4)}
  .yrbox{display:flex;align-items:center;gap:7px;min-width:200px;flex:0 1 260px}
  .yrbox .yl{color:var(--dim);font-size:11px;white-space:nowrap;font-variant-numeric:tabular-nums}
  .tools select{padding:6px 8px;background:#0c0f1a;border:1px solid var(--line);border-radius:7px;
    color:var(--txt);font-size:12px;outline:none;max-width:180px}
  .tools label.ck{display:flex;align-items:center;gap:5px;color:var(--dim);font-size:11.5px;cursor:pointer;white-space:nowrap}
  .tools input[type=checkbox]{accent-color:var(--accent)}
  #count{color:var(--dim);font-size:11px;margin-left:auto;white-space:nowrap}
  .msort{display:none;align-items:center;gap:6px}
  .msort .msort-lbl{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.6px}
  .msort select{max-width:none}
  #mSortDir{padding:6px 10px;background:#0c0f1a;border:1px solid var(--line);border-radius:7px;
    color:var(--accent);font-size:12px;line-height:1;cursor:pointer;outline:none}
  #mSortDir:hover{border-color:rgba(255,255,255,.25)}

  #wrap{max-width:1180px;margin:0 auto;padding:14px 14px 60px;overflow-x:auto}
  table{width:100%;border-collapse:collapse;min-width:760px}
  thead th{position:sticky;top:0;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1px;
    color:var(--dim);padding:8px 10px;border-bottom:1px solid var(--line);cursor:pointer;user-select:none;
    background:var(--bg);white-space:nowrap;z-index:2}
  thead th:hover{color:var(--txt)}
  thead th .arr{color:var(--accent);font-size:9px;margin-left:3px}
  tbody tr.row{cursor:pointer;transition:background .1s}
  tbody tr.row:hover{background:rgba(255,255,255,.04)}
  tbody tr.row.open{background:rgba(124,242,214,.05)}
  td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.045);font-size:12.5px;vertical-align:middle}
  td.name{font-weight:600;max-width:340px}
  td.name .al{display:block;color:var(--dim);font-size:10.5px;font-weight:400;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  td.num{font-variant-numeric:tabular-nums;white-space:nowrap}
  .gpill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10.5px;white-space:nowrap}
  .tcell{display:flex;align-items:center;gap:7px;min-width:118px}
  .tbar{flex:1;height:6px;border-radius:4px;background:rgba(255,255,255,.08);overflow:hidden;min-width:44px}
  .tbar i{display:block;height:100%;border-radius:4px}
  .tval{width:26px;text-align:right;font-variant-numeric:tabular-nums;font-weight:650}
  .lv{display:inline-block;width:26px;text-align:center;border-radius:6px;font-size:10.5px;
    font-weight:700;padding:2px 0;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12)}

  tr.detail td{background:rgba(0,0,0,.25);padding:14px 18px;border-bottom:1px solid var(--line)}
  .dgrid{display:grid;grid-template-columns:1.4fr 1fr;gap:6px 26px}
  @media(max-width:820px){.dgrid{grid-template-columns:1fr}}
  .desc{color:#c7cbde;font-size:12.5px;margin:2px 0 8px}
  h4.sec{margin:10px 0 5px;font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:var(--dim)}
  ul.ev{margin:0 0 4px;padding:0;list-style:none}
  ul.ev li{position:relative;padding:3px 0 3px 18px;font-size:12px;color:#c7cbde}
  ul.ev li::before{position:absolute;left:0;top:2px;font-weight:700}
  ul.ev.for li::before{content:"✓";color:#4ade80}
  ul.ev.against li::before{content:"✗";color:#f87171}
  .sb{border:1px solid var(--line,#2a2f45);border-radius:8px;padding:8px 10px;background:rgba(0,0,0,.22);
    font-size:11px;line-height:1.45;margin:8px 0}
  .sb .sbh{font-weight:600;margin:8px 0 3px;color:var(--txt,#e8eaf2)}
  .sb .sbh:first-child{margin-top:0}
  .sbrow{display:flex;gap:10px;justify-content:space-between;align-items:baseline;padding:1px 0;color:var(--dim,#8b93ab)}
  .sbrow>span{min-width:0}
  .sbrow b{font-family:ui-monospace,Consolas,monospace;font-weight:600;white-space:nowrap;color:var(--txt,#e8eaf2)}
  .sbrow.pos b{color:#4ade80}.sbrow.neg b{color:#f87171}
  .sbrow.tot{border-top:1px solid var(--line,#2a2f45);margin-top:3px;padding-top:3px}
  .sbrow.tot span{color:var(--txt,#e8eaf2)}
  .sb .dim{color:var(--dim,#8b93ab)}
  .steel{border-left:3px solid #fbbf24;padding:6px 10px;background:rgba(251,191,36,.06);
    color:#d9dcea;font-size:12px;border-radius:0 8px 8px 0;margin:2px 0 6px}
  .prec{display:inline-block;margin:3px 6px 0 0;padding:2px 9px;border-radius:14px;
    border:1px solid rgba(74,222,128,.4);color:#4ade80;font-size:11px;cursor:pointer}
  .prec:hover{background:rgba(74,222,128,.12)}
  .btag{font-size:9.5px;border-radius:8px;padding:0 6px;margin-left:4px;white-space:nowrap}
  a.src{color:var(--accent);text-decoration:none;font-size:11.5px}
  .metric{margin:7px 0}
  .metric .ml{display:flex;justify-content:space-between;font-size:10.5px;color:var(--dim);margin-bottom:3px}
  .metric .mv{color:var(--txt);font-weight:650;font-variant-numeric:tabular-nums}
  .track{height:7px;border-radius:5px;background:rgba(255,255,255,.08);overflow:hidden}
  .fill{height:100%;border-radius:5px}

  #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:120;
    background:var(--bg);flex-direction:column;gap:14px}
  #loading .spin{width:34px;height:34px;border:3px solid rgba(255,255,255,.12);
    border-top-color:var(--accent);border-radius:50%;animation:s 1s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  @media(max-width:680px){
    #q{flex:1;width:auto}
    #count{width:100%;margin-left:0}
    .msort{display:flex;width:100%}
    .msort select{flex:1}

    /* stacked card layout replaces the 8-col table */
    #wrap{overflow-x:hidden;padding:12px 12px 60px}
    table{min-width:0;width:100%;display:block}
    thead{display:none}
    tbody{display:block}
    tbody tr.row{
      display:flex;flex-wrap:wrap;align-items:center;gap:6px 7px;
      border:1px solid var(--line);border-radius:11px;margin:0 0 10px;
      padding:11px 13px;background:var(--panel)}
    tbody tr.row.open{background:rgba(124,242,214,.06);border-color:rgba(124,242,214,.35)}
    tbody tr.row td{border:none;padding:0}
    td.name{flex:1 0 100%;max-width:none;font-size:14px;margin-bottom:1px}
    td.name .al{white-space:normal}
    td.c-genre{order:2;flex:0 0 auto}
    td.c-truth{order:3;flex:1 0 100%;margin:1px 0 2px}
    td.c-truth .tcell{min-width:0}
    td[data-label]{order:4;flex:0 0 auto;display:inline-flex;align-items:center;gap:5px;
      background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:8px;
      padding:3px 9px;font-size:11px;color:var(--txt)}
    td[data-label]::before{content:attr(data-label);color:var(--dim);
      font-size:9px;text-transform:uppercase;letter-spacing:.6px}
    td.c-lvl .lv{width:auto;padding:0;background:none;border:none;font-size:11px}

    /* expanded detail stacks to one column, long urls wrap */
    tr.detail{display:block}
    tr.detail td{display:block;padding:12px 13px}
    .dgrid{grid-template-columns:1fr}
    a.src,.prec,.steel{overflow-wrap:anywhere;word-break:break-word}
  }
</style>
</head>
<body>

<header id="hdr">
  <div class="top">
    <h1>📋 The Conspiracy Atlas · List</h1>
    <nav id="pagenav">
      <a href="index.html">3D flythrough</a><a href="2d.html">2D map</a><a href="iceberg.html">Iceberg</a><a href="list.html" class="on">List</a><a href="methodology.html">Methodology</a>
    </nav>
  </div>
  <div class="tools">
    <input id="q" placeholder="search name, alias, summary…" autocomplete="off">
    <select id="genreSel"><option value="">all genres</option></select>
    <select id="statusSel"><option value="">all truth levels</option></select>
    <select id="lvlSel"><option value="">all iceberg levels</option></select>
    <span class="yrbox"><span class="yl">year</span><span class="dr" id="fYear"></span><span class="yl" id="fYlab">all time</span></span>
    <label class="ck"><input type="checkbox" id="srcOnly"> sourced only</label>
    <label class="ck"><input type="checkbox" id="steelOnly"> steelman only</label>
    <div id="mSort" class="msort">
      <span class="msort-lbl">sort</span>
      <select id="mSortSel"></select>
      <button id="mSortDir" type="button" title="toggle ascending / descending">▼</button>
    </div>
    <span id="count"></span>
  </div>
</header>

<div id="wrap">
  <table>
    <thead><tr id="headRow"></tr></thead>
    <tbody id="tb"></tbody>
  </table>
</div>

<div id="loading"><div class="spin"></div><div>tabulating the plots…</div></div>

<script>
const DATA_URL='data.json?v=15';
const esc=s=>(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
function statusCol(tr){return tr>=91?'#4ade80':tr>=76?'#86efac':tr>=56?'#bef264':tr>=31?'#fbbf24':tr>=11?'#fb923c':'#f87171';}
const fmtYear=y=>y<0?(-y)+' BC':y;
const biasTag=s=>{const b=((META&&META.bias_scale)||[]).find(x=>x.key===s.bias);
  return b?` <span class="btag" style="color:${b.color};border:1px solid ${b.color}44" title="independence weight ${b.weight}/5">${esc(b.label)}</span>`
        :(s.type?` <span style="color:var(--dim);font-size:10px">${esc(s.type)}</span>`:'');};

/* same level assignment as iceberg.html — keeps the two views consistent */
function assignLevels(T){
  const lvl=new Array(T.length); const low=[];
  T.forEach((t,i)=>{
    if(t.truth>=91)lvl[i]=1; else if(t.truth>=76)lvl[i]=2; else if(t.truth>=56)lvl[i]=3;
    else if(t.truth>=41)lvl[i]=4; else if(t.truth>=31)lvl[i]=5; else low.push(i);
  });
  low.sort((a,b)=>T[b].notoriety-T[a].notoriety || T[a].name.localeCompare(T[b].name));
  const n=low.length||1;
  low.forEach((idx,r)=>{lvl[idx]=6+Math.min(4,Math.floor(r*5/n));});
  return lvl;
}

const COLS=[
  {k:'name',  label:'Theory',    get:t=>t.name.toLowerCase(), asc:true},
  {k:'genre', label:'Genre',     get:t=>t.genre, asc:true},
  {k:'year',  label:'Year',      get:t=>t.year, asc:true},
  {k:'truth', label:'Truth',     get:t=>t.truth, asc:false},
  {k:'impact',label:'Impact',    get:t=>t.impact, asc:false},
  {k:'notoriety',label:'Notoriety',get:t=>t.notoriety, asc:false},
  {k:'level', label:'Iceberg',   get:t=>t._lvl, asc:true},
  {k:'srcs',  label:'Sources',   get:t=>(t.sources||[]).length+(t.wikipedia?1:0), asc:false},
];

let T=[],META,GEN=[],idx={};
let sortK='truth', sortAsc=false, openId=null;
const gc=k=>{const g=GEN.find(x=>x.key===k);return g?g.color:'#888';};
const glbl=k=>{const g=GEN.find(x=>x.key===k);return g?g.label:k;};
function statusOf(tr){for(const s of META.truth_scale){if(tr>=s.min&&tr<=s.max)return s;}return{label:'?',min:0};}

fetch(DATA_URL).then(r=>r.json()).then(d=>{
  T=d.theories;META=d.meta;GEN=META.genres;
  T.forEach((t,i)=>idx[t.id]=i);
  const lv=assignLevels(T);
  T.forEach((t,i)=>t._lvl=lv[i]);
  buildUI(); render();
  document.getElementById('loading').style.display='none';
}).catch(e=>{document.getElementById('loading').innerHTML='<div>failed to load data.json<br><small>'+e+'</small></div>';});

function buildUI(){
  // header cells
  const hr=document.getElementById('headRow');
  COLS.forEach(c=>{
    const th=document.createElement('th');th.dataset.k=c.k;th.innerHTML=esc(c.label)+'<span class="arr"></span>';
    th.onclick=()=>{ if(sortK===c.k)sortAsc=!sortAsc; else {sortK=c.k;sortAsc=c.asc;} render(); };
    hr.appendChild(th);
  });
  // genre filter
  const gs=document.getElementById('genreSel');
  GEN.filter(g=>META.by_genre[g.key]).forEach(g=>{
    const o=document.createElement('option');o.value=g.key;o.textContent=glbl(g.key);gs.appendChild(o);});
  // truth-status filter
  const ss=document.getElementById('statusSel');
  META.truth_scale.slice().sort((a,b)=>b.min-a.min).forEach(s=>{
    const o=document.createElement('option');o.value=s.label;o.textContent=`${s.label} (${s.min}–${s.max})`;ss.appendChild(o);});
  // mobile sort control (drives the same sortK / sortAsc state as the header)
  const msel=document.getElementById('mSortSel');
  COLS.forEach(c=>{const o=document.createElement('option');o.value=c.k;o.textContent=c.label;msel.appendChild(o);});
  msel.onchange=()=>{const c=COLS.find(x=>x.k===msel.value);sortK=c.k;sortAsc=c.asc;render();};
  document.getElementById('mSortDir').onclick=()=>{sortAsc=!sortAsc;render();};
  const lv=document.getElementById('lvlSel');
  for(let k=1;k<=10;k++){const o=document.createElement('option');o.value=k;o.textContent='level '+k;lv.appendChild(o);}
  document.getElementById('q').oninput=render;
  gs.onchange=render; ss.onchange=render;
  document.getElementById('srcOnly').onchange=render;
  document.getElementById('steelOnly').onchange=render;
  lv.onchange=render;
  mkYearSlider(document.getElementById('fYear'), document.getElementById('fYlab'),
    [...new Set(T.map(t=>t.year))].sort((x,y)=>x-y));
}


// dual-handle year slider over the distinct years present in the data
let YR={lo:null,hi:null};
function mkYearSlider(box,lab,years){
  // logarithmic in "years before present": slider travel is proportional to
  // log(age), so the data-dense recent past gets most of the resolution and
  // antiquity compresses into the left end
  const yMin=years[0], yMax=years[years.length-1];
  const S=240, ageMax=Math.max(2, yMax+1-yMin);
  const yearAt=p=>{
    if(p<=0) return yMin;
    if(p>=S) return yMax;
    const age=Math.pow(ageMax, 1-p/S);          // ageMax .. 1, log-spaced
    return Math.min(yMax, Math.max(yMin, Math.round(yMax+1-age)));
  };
  box.innerHTML=`<div class="track"></div><div class="fillbar"></div>
    <input type="range" min="0" max="${S}" value="0" step="1" aria-label="year from">
    <input type="range" min="0" max="${S}" value="${S}" step="1" aria-label="year to">`;
  const inp=box.querySelectorAll('input'), fill=box.querySelector('.fillbar');
  const fy=y=>y<0?(-y)+' BC':y;
  function upd(){
    let a=+inp[0].value,b=+inp[1].value; if(a>b)[a,b]=[b,a];
    fill.style.left=(a/S*100)+'%'; fill.style.right=(100-b/S*100)+'%';
    const full=(a===0&&b===S);
    YR.lo=a===0?null:yearAt(a); YR.hi=b===S?null:yearAt(b);
    lab.textContent=full?'all time':(fy(yearAt(a))+' \u2013 '+fy(yearAt(b)));
    render();
  }
  inp[0].oninput=upd; inp[1].oninput=upd; upd();
}
function filtered(){
  const q=document.getElementById('q').value.trim().toLowerCase();
  const g=document.getElementById('genreSel').value;
  const st=document.getElementById('statusSel').value;
  const so=document.getElementById('srcOnly').checked;
  const steel=document.getElementById('steelOnly').checked;
  const lv=document.getElementById('lvlSel').value;

  return T.filter(t=>{
    if(g && t.genre!==g)return false;
    if(st && statusOf(t.truth).label!==st)return false;
    if(so && !(t.wikipedia||(t.sources&&t.sources.length)))return false;
    if(steel && !t.steelman)return false;
    if(lv && t._lvl!==+lv)return false;
    if(YR.lo!=null && t.year<YR.lo)return false;
    if(YR.hi!=null && t.year>YR.hi)return false;
    if(q && !(t.name.toLowerCase().includes(q)||(t.aliases||[]).some(a=>a.toLowerCase().includes(q))||(t.summary||'').toLowerCase().includes(q)))return false;
    return true;
  });
}

function render(){
  const col=COLS.find(c=>c.k===sortK);
  const rows=filtered().sort((a,b)=>{
    const va=col.get(a),vb=col.get(b);
    const c=va<vb?-1:va>vb?1:0;
    return (sortAsc?c:-c)||a.name.localeCompare(b.name);
  });
  // header arrows
  document.querySelectorAll('#headRow th').forEach(th=>{
    th.querySelector('.arr').textContent=th.dataset.k===sortK?(sortAsc?'▲':'▼'):'';});
  // keep mobile sort control in sync with current state
  const msel=document.getElementById('mSortSel');
  if(msel)msel.value=sortK;
  const mdir=document.getElementById('mSortDir');
  if(mdir)mdir.textContent=sortAsc?'▲':'▼';
  document.getElementById('count').textContent=`${rows.length} / ${T.length} theories`;

  const tb=document.getElementById('tb');
  const html=rows.map(t=>{
    const g=gc(t.genre),sc=truthCol(t);
    const nsrc=(t.sources||[]).length+((t.wikipedia&&!(t.sources||[]).some(s=>s.url===t.wikipedia))?1:0);
    return `<tr class="row" data-id="${esc(t.id)}">
      <td class="name">${esc(t.name)}${t.aliases&&t.aliases.length?`<span class="al">${esc(t.aliases.join(' · '))}</span>`:''}</td>
      <td class="c-genre"><span class="gpill" style="background:${g}22;color:${g};border:1px solid ${g}55">${esc(glbl(t.genre))}</span></td>
      <td class="num" data-label="Year">${fmtYear(t.year)}</td>
      <td class="c-truth"><div class="tcell"><span class="tval" style="color:${sc}">${t.truth}</span><span class="tbar"><i style="width:${t.truth}%;background:${sc}"></i></span></div></td>
      <td class="num" data-label="Impact">${t.impact}</td>
      <td class="num" data-label="Notoriety">${t.notoriety}</td>
      <td class="c-lvl" data-label="Iceberg"><span class="lv">${t._lvl}</span></td>
      <td class="num" data-label="Sources">${nsrc}</td>
    </tr>`;
  }).join('');
  tb.innerHTML=html;
  openId=null;
  tb.querySelectorAll('tr.row').forEach(tr=>tr.onclick=()=>toggleDetail(tr));
}

function bar(label,val,c){
  return `<div class="metric"><div class="ml"><span>${label}</span><span class="mv">${val}<span style="color:var(--dim)">/100</span></span></div>
  <div class="track"><div class="fill" style="width:${val}%;background:${c}"></div></div></div>`;
}
// ---- transparent formula-score breakdown (computed in src/score.py at build) ----
const SB_SCALE=['a few individuals','thousands','hundreds of thousands','millions','hundreds of millions','everyone'];
const SB_SEV=['trivial / symbolic','money or privacy losses','serious financial or civic harm','major health harm / oppression','deaths at scale','mass death'];
const SB_REACH=['one small group','one firm or office','an industry / major agency','a national-government branch','multiple governments','the world order'];
const SB_ATT=['obscure forum lore','niche community','known in conspiracy culture','mainstream coverage','widely known','household name'];
// ---- metaphysical "frame" plausibility axis (distinct from factual truth) ----
const FSC=()=>((typeof META!=='undefined'&&META.frame_scale)||[]);
const isFrame=t=>!!(t&&t.truth_kind==='frame');
function frameOf(v){for(const s of FSC()){if(v>=s.min&&v<=s.max)return s;}return{label:'?',color:'#8b78d4'};}
const frameCol=v=>frameOf(v).color;
const truthCol=t=>isFrame(t)?frameCol(t.truth):statusCol(t.truth);
const truthLabel=t=>isFrame(t)?frameOf(t.truth).label:statusOf(t.truth).label;
const truthBarLabel=t=>isFrame(t)?'Plausibility':'How true';
const FR_PED=['no tradition — invented','fringe modern esoterica','folk/occult or minor position','major tradition or academic minority','live academic / physics debate'];
const FR_COH=['self-contradictory','many physics violations','one major unproven posit','consistent, adds unfalsifiables','fully consistent — an interpretation'];
const FR_PAR=['baroque ontology','several new entities','one new kind of thing','economical','maximally parsimonious'];
function frameRows(t,S,f2,row,esc){
  let h=`<div class="sbh">Plausibility ${t.truth} = 100·σ( pedigree + coherence + parsimony + argued support ) · capped ${S.ceiling}</div>`;
  h+=row(`pedigree · ${FR_PED[S.ped[0]]||''}`,f2(S.ped[1]),S.ped[1]>0?'pos':'neg');
  h+=row(`coherence · ${FR_COH[S.coh[0]]||''}`,f2(S.coh[1]),S.coh[1]>0?'pos':'neg');
  h+=row(`parsimony · ${FR_PAR[S.par[0]]||''}`,f2(S.par[1]),S.par[1]>0?'pos':'neg');
  for(const e of (S.src||[])){
    const src=(t.sources||[])[e[0]];
    const against=(e[1]==='debunks'||e[1]==='disproves');
    const lab=src?`<a class="src" href="${esc(src.url)}" target="_blank" rel="noopener">${esc(src.title||src.url)} ↗</a> <span class="dim">argues ${against?'against':'for'} · quality ${e[2]}</span>`:`<span class="dim">source</span>`;
    h+=row(lab,f2(e[3]),e[3]>0?'pos':'neg');
  }
  h+=row(`log-odds ${f2(S.logit)} → logistic σ (capped ${S.ceiling})`,String(t.truth),'tot');
  return h;
}
function scoreHtml(t){
  const S=t.score, SC=(META&&META.score_constants)||null;
  let h='<h4 class="sec">\u2699 Score breakdown</h4>';
  if(!S||!SC) return h+'<div class="sb"><div class="sbrow"><span class="dim">Editorial estimate \u2014 this record has no factor annotation yet.</span></div></div>';
  const f2=x=>(x>0?'+':x<0?'\u2212':'')+Math.abs(x).toFixed(2);
  const row=(l,v,c)=>`<div class="sbrow${c?' '+c:''}"><span>${l}</span>${v!==''?`<b>${v}</b>`:''}</div>`;
  h+='<div class="sb">';
  if(S.kind==='frame'){ h+=frameRows(t,S,f2,row,esc); } else {
  h+=`<div class="sbh">Truth ${t.truth} = 100\u00b7\u03c3( MMO prior + evidence \u2212 leak )</div>`;
  h+=row(`prior \u00b7 means ${S.mmo[0]}/4 \u00b7 motive ${S.mmo[1]}/4 \u00b7 opportunity ${S.mmo[2]}/4 \u2014 conjunction sets a-priori plausibility, not truth${S.imp?' \u00b7 <span style="color:#f87171">physically impossible</span>':''}`,f2(S.prior),S.prior>0?'pos':'neg');
  for(const e of (S.ev||[])){
    const src=e[0]>=0?(t.sources||[])[e[0]]:null;
    const lab=src?`<a class="src" href="${esc(src.url)}" target="_blank" rel="noopener">${esc(src.title||src.url)} \u2197</a> <span class="dim">${esc(e[1])} \u00b7 quality ${e[2]}${e[5]?` \u00b7 <span style="color:#fbbf24">self-denial, weight \u00d7${SC.self_denial_discount}</span>`:``}</span>`
                 :`<span class="dim">unsourced ${esc(e[1])} item</span>`;
    h+=row(lab,f2(e[4]),e[4]>0?'pos':'neg');
  }
  if(S.leak) h+=row(`leak penalty \u00b7 ~10<sup>${S.leak[0]}</sup> insiders \u00d7 ${S.leak[1]} yr unleaked (Grimes 2016)`,'\u2212'+S.leak[2].toFixed(2),'neg');
  h+=row(`log-odds ${f2(S.logit)} \u2192 logistic \u03c3`,String(t.truth),'tot');
  }
  h+=`<div class="sbh">Impact ${t.impact} = magnitude ${S.imag} \u00d7 plausibility ${S.itmp}</div>`;
  h+=row(`scale ${S.if[0]}/5 \u00b7 ${SB_SCALE[S.if[0]]||''}`,'');
  h+=row(`severity ${S.if[1]}/5 \u00b7 ${SB_SEV[S.if[1]]||''}`,'');
  h+=row(`reach ${S.if[2]}/5 \u00b7 ${SB_REACH[S.if[2]]||''}`,'');
  h+=row(`consequence-if-true magnitude ${S.imag}/100, tempered \u00d7${S.itmp} by ${S.kind==='frame'?'plausibility':'truth'} ${t.truth}`,String(t.impact),'tot');
  h+=`<div class="sbh">Notoriety ${t.notoriety} = measured attention</div>`;
  if(S.pv!=null&&S.pv>0)
    h+=row(`${Number(S.pv).toLocaleString('en-US')} Wikipedia pageviews/yr \u2192 100\u00b7(log\u2081\u2080V \u2212 ${SC.noto_log_off})/${SC.noto_log_div}, blended ×${SC.noto_pv_blend} toward attention tier ${S.att}/5`,String(t.notoriety));
  else if(S.reach!=null)
    h+=row(`researched web footprint \u00b7 reach ${S.reach}/92 (Reddit / YouTube / news / search volume)`,String(t.notoriety));
  else
    h+=row(`no data \u00b7 attention tier ${S.att}/5 (${SB_ATT[S.att]||''})`,String(t.notoriety));
  if(t.truth_manual!=null)
    h+=`<div class="sbrow" style="margin-top:5px"><span class="dim">pre-formula editorial scores \u00b7 truth ${t.truth_manual} \u00b7 impact ${t.impact_manual} \u00b7 notoriety ${t.notoriety_manual}</span></div>`;
  return h+'</div>';
}
function toggleDetail(tr){
  const id=tr.dataset.id;
  const existing=document.querySelector('tr.detail');
  const wasOpen=openId===id;
  if(existing)existing.remove();
  document.querySelectorAll('tr.row.open').forEach(r=>r.classList.remove('open'));
  openId=null;
  if(wasOpen)return;
  const t=T[idx[id]];if(!t)return;
  openId=id; tr.classList.add('open');
  const evLi=x=>{const txt=typeof x==='string'?x:(x.text||''),su=typeof x==='object'&&x?x.source:null;
    return `<li>${esc(txt)}${su?` <a class="src" href="${esc(su)}" target="_blank" rel="noopener" title="source">↗</a>`:''}</li>`;};
  let ev='';
  if(t.evidence_for&&t.evidence_for.length)ev+=`<h4 class="sec">Evidence / claims for</h4><ul class="ev for">${t.evidence_for.map(evLi).join('')}</ul>`;
  if(t.evidence_against&&t.evidence_against.length)ev+=`<h4 class="sec">Evidence against</h4><ul class="ev against">${t.evidence_against.map(evLi).join('')}</ul>`;
  const srcs=(t.sources||[]).slice();
  if(t.wikipedia && !srcs.some(x=>x.url===t.wikipedia))srcs.unshift({title:'Wikipedia',url:t.wikipedia,type:'wikipedia',bias:'wikipedia'});
  const srcHtml=srcs.length?`<h4 class="sec">Sources (${srcs.length})</h4>`+srcs.map(x=>
    `<div style="padding:2px 0"><a class="src" href="${esc(x.url)}" target="_blank" rel="noopener">${esc(x.title||x.url)} ↗</a>`+
    biasTag(x)+`</div>`).join(''):'';
  let steel='';
  if(t.steelman||(t.precedents&&t.precedents.length)){
    steel=`<h4 class="sec">🛡 Steelman · proven precedent</h4>`;
    if(t.steelman)steel+=`<div class="steel">${esc(t.steelman)}</div>`;
    if(t.precedents&&t.precedents.length)
      steel+=t.precedents.map(id=>idx[id]!=null?`<span class="prec" data-pid="${esc(id)}">⚖ ${esc(T[idx[id]].name)}</span>`:'').join('');
  }
  const dtr=document.createElement('tr');dtr.className='detail';
  dtr.innerHTML=`<td colspan="${COLS.length}"><div class="dgrid">
    <div><div class="desc">${esc(t.summary||'')}</div>${ev}${steel}</div>
    <div>${bar(truthBarLabel(t),t.truth,truthCol(t))}${bar('Impact',t.impact,'#60a5fa')}${bar('Notoriety',t.notoriety,'#a855f7')}${scoreHtml(t)}${srcHtml}</div>
  </div></td>`;
  tr.after(dtr);
  dtr.querySelectorAll('.prec').forEach(el=>el.onclick=e=>{e.stopPropagation();
    const q=document.getElementById('q'); q.value=T[idx[el.dataset.pid]].name; render();});
}
</script>
